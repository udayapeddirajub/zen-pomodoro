<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Pomodoro | AI Task Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Settings Button -->
    <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>

    <div class="app-layout">
        
        <!-- Left Panel: AI Task Breakdown -->
        <aside class="glass-panel task-panel">
            <h2>AI Breakdown</h2>
            <p class="subtitle">Overwhelmed? Let AI chop your task.</p>
            
            <div class="input-group">
                <textarea id="ai-task-input" placeholder="e.g. Build a full-stack portfolio website..." rows="3"></textarea>
                <button id="ai-generate-btn" class="btn secondary-btn">Generate Steps ✨</button>
            </div>

            <div id="ai-loading" class="hidden">
                <div class="spinner"></div>
                <p>Gemini is thinking...</p>
            </div>

            <ul id="task-list" class="task-list">
                <!-- Tasks will be appended here -->
            </ul>
        </aside>

        <!-- Right Panel: Timer -->
        <main class="glass-panel timer-panel">
            <header>
                <h1>Zen Pomodoro</h1>
                <p id="mode-text">Focus Mode</p>
            </header>

            <div class="timer-display" id="timer">
                25:00
            </div>
            
            <svg class="progress-ring" width="300" height="300">
                <circle class="progress-ring__circle" stroke="rgba(255, 255, 255, 0.1)" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
                <circle class="progress-ring__progress" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff7eb3" />
                        <stop offset="100%" stop-color="#7a88ff" />
                    </linearGradient>
                </defs>
            </svg>

            <div class="controls">
                <button id="start-btn" class="btn primary-btn">Start</button>
                <button id="reset-btn" class="btn secondary-btn">Reset</button>
            </div>

            <div class="mode-toggles">
                <button id="work-btn" class="active">Work</button>
                <button id="break-btn">Break</button>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Settings</h2>
            <button id="close-modal-btn" class="icon-btn close-btn">❌</button>
            <div class="form-group">
                <label for="api-key-input">Gemini API Key</label>
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <small>Stored locally. Never sent to our servers.</small>
            </div>
            <button id="save-settings-btn" class="btn primary-btn">Save</button>
        </div>
    </div>

    <script src="js/timer.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
